<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLOE — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>CLOE</h1>
    <p class="description">
      Configure which links should open in your default browser.
    </p>

    <div id="native-status" class="status-bar checking">
      <span class="status-dot"></span>
      <span id="native-status-text">Checking native host…</span>
      <button id="native-recheck" type="button" class="recheck-btn" hidden>Re-check</button>
    </div>

    <label class="toggle-row" id="intercept-all-row">
      <input id="intercept-all" type="checkbox">
      <span>Intercept all links</span>
    </label>

    <hr class="divider">


    <div id="patterns-section">
      <p class="section-label">URL patterns (regex) to open in the default browser:</p>

      <div class="preset-row">
        <select id="preset-select">
          <option value="">Quick add a preset…</option>
        </select>
        <button id="preset-add-btn" type="button" disabled>Add</button>
      </div>

      <div class="add-row">
        <input
          id="new-pattern"
          type="text"
          placeholder="Or type a custom regex…"
          spellcheck="false"
          autocomplete="off"
        >
        <button id="add-btn" type="button">Add</button>
      </div>
      <p id="input-error" class="error" hidden></p>

      <ul id="pattern-list"></ul>

      <p id="empty-state" class="empty" hidden>
        No patterns configured — no links will be intercepted.
      </p>
    </div>

    <hr class="divider">

    <label class="toggle-row debug-row">
      <input id="debug-mode" type="checkbox">
      <span>Debug mode <span class="hint">(logs interception decisions to the browser console)</span></span>
    </label>
  </div>

  <script src="options.js"></script>
</body>
</html>
